[servers]
worker-node-1 ansible_host=<your-worker-node1-ip-address>
worker-node-2 ansible_host=<your-worker-node2-ip-address>
worker-node-1 ansible_user=ubuntu
worker-node-2 ansible_user=ubuntu

[all:vars]
ansible_ssh_private_key_file=<path-to-dir>/<your-key-name>
ansible_python_interpreter=/usr/bin/python3
ansible_host_key_checking=false