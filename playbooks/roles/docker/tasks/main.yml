---
# tasks file for role/docker
- name: update system
  apt:
    name: "*"
    state: latest
  
- name: Install Docker.io
  apt:
    name: docker.io
    state: latest

- name: Add users to Docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Restart docker
  ansible.builtin.service:
    name: docker
    state: restarted