- name: Setup Nginx
  hosts: servers
  become: true

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
    
    - name: Copy the custom Nginx file
      copy:
        src: index.html
        dest: /var/www/html
    
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Enable Nginx
      ansible.builtin.systemd_service:
        name: nginx
        enabled: true